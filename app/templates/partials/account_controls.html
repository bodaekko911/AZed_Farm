<div class="app-nav-actions topbar-right">
  <button
    class="mode-btn app-theme-toggle"
    id="mode-btn"
    type="button"
    data-theme-toggle
    title="Switch color theme"
    aria-label="Switch color theme"
    aria-pressed="false"
  >&#127769;</button>

  <div class="account-menu">
    <button
      class="user-pill"
      id="account-trigger"
      type="button"
      onclick="window.__appNav && window.__appNav.toggleAccount(event)"
      aria-haspopup="menu"
      aria-expanded="false"
    >
      <div class="user-avatar" id="user-avatar">{{ (current_user.name[:1] if current_user and current_user.name else "U") | upper }}</div>
      <span class="user-name" id="user-name">{{ current_user.name if current_user else "User" }}</span>
      <span class="menu-caret">&#9662;</span>
    </button>

    <div class="account-dropdown" id="account-dropdown" role="menu">
      <div class="account-head">
        <div class="account-label">Signed in as</div>
        <div class="account-email" id="user-email">{{ current_user.email if current_user else "" }}</div>
      </div>
      <a href="/users/password" class="account-item" role="menuitem">Change Password</a>
      <button
        class="account-item danger"
        id="signout-btn"
        type="button"
        onclick="window.__appNav && window.__appNav.signOut()"
        role="menuitem"
      >Sign out</button>
    </div>
  </div>
</div>
